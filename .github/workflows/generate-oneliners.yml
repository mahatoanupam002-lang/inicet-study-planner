name: Daily One-Liner Generator

on:
  schedule:
    - cron: '0 19 * * *'   # 00:30 IST
    - cron: '0  3 * * *'   # 08:30 IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scripts
        run: npm install

      - name: Generate daily one-liners
        working-directory: scripts
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node generate-oneliners.mjs

      - name: Commit one-liner bank
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/public/oneliners.json
          git diff --cached --quiet || git commit -m "chore(oneliners): daily batch $(date -u '+%Y-%m-%d %H:%M')"
          git push
