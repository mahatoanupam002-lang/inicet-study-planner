name: Daily Question Generator

on:
  schedule:
    - cron: '30 18 * * *'   # 00:00 IST
    - cron: '30  2 * * *'   # 08:00 IST
    - cron: '30 10 * * *'   # 16:00 IST
  workflow_dispatch:         # manual trigger from GitHub Actions tab

permissions:
  contents: write   # needed to commit the JSON file back to the repo

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install generator dependencies
        working-directory: scripts
        run: npm install

      # Ensure the output directory exists
      - name: Ensure public directory exists
        run: mkdir -p deploy/public

      - name: Generate 500 daily questions
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node generate-questions.mjs

      - name: Commit updated question bank
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/public/daily-questions.json
          git diff --cached --quiet || git commit -m "chore(questions): daily batch $(date -u '+%Y-%m-%d')"
          git push
